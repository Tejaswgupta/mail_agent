name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: "Client name (e.g. AcmeCorp)"
        required: true
      expiry:
        description: "License expiry date (YYYY-MM-DD)"
        required: true
  push:
    branches: [votum]
    paths:
      - "mail_agent/**"

jobs:
  build:
    runs-on: windows-latest

    env:
      CLIENT_ID: ${{ github.event.inputs.client_id || 'ci-build' }}
      EXPIRY: ${{ github.event.inputs.expiry || '2099-12-31' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pyarmor
          playwright install chromium

      - name: Inject signing key into license_validator.py
        shell: python
        env:
          SIGNING_KEY: ${{ secrets.LICENSE_SIGNING_KEY }}
        run: |
          import os, re
          key = os.environ["SIGNING_KEY"]
          with open("license_validator.py", "r", encoding="utf-8") as f:
            src = f.read()
          src = re.sub(r'_SIGNING_KEY = b"[^"]+"', f'_SIGNING_KEY = b"{key}"', src)
          with open("license_validator.py", "w", encoding="utf-8") as f:
            f.write(src)

      - name: Mint license key
        shell: python
        env:
          SIGNING_KEY: ${{ secrets.LICENSE_SIGNING_KEY }}
          CLIENT_ID: ${{ env.CLIENT_ID }}
          EXPIRY: ${{ env.EXPIRY }}
        run: |
          import os, base64, hashlib, hmac, json
          key = os.environ["SIGNING_KEY"].encode()
          client_id = os.environ["CLIENT_ID"]
          expiry = os.environ["EXPIRY"]
          payload = json.dumps({"client_id": client_id, "expiry": expiry}, separators=(",", ":"))
          payload_b64 = base64.b64encode(payload.encode()).decode()
          sig = hmac.new(key, payload_b64.encode(), hashlib.sha256).hexdigest()
          with open("license.key", "w", encoding="utf-8") as f:
            f.write(f"{payload_b64}.{sig}\n")
          print(f"Minted license for '{client_id}' valid until {expiry}")

      - name: Obfuscate source
        run: |
          pyarmor gen `
            license_validator.py `
            storage.py `
            watcher.py `
            zoho_client.py `
            attachment_processor.py `
            manifest_normalizer.py `
            session_monitor.py `
            notifier.py `
            client_interface.py `
            launcher.py `
            config.py `
            keep_awake.py `
            __init__.py

      - name: Build EXE
        run: |
          pyinstaller `
            --onefile `
            --name mail_agent `
            --add-data "dist\pyarmor_runtime_000000;pyarmor_runtime_000000" `
            --add-data "migrations;migrations" `
            --add-data "mail.html;." `
            --add-data "mail_with_attachment_body.html;." `
            dist\launcher.py

      - name: Package for client
        shell: pwsh
        run: |
          $out = "release"
          New-Item -ItemType Directory -Force -Path $out
          Copy-Item "dist\mail_agent.exe" "$out\mail_agent.exe"
          Copy-Item "license.key"         "$out\license.key"
          Copy-Item ".env.example"        "$out\.env.example"
          Copy-Item "INSTALL.md"          "$out\INSTALL.md"
          Compress-Archive -Path "$out\*" -DestinationPath "mail_agent_${{ env.CLIENT_ID }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mail_agent_${{ env.CLIENT_ID }}
          path: mail_agent_${{ env.CLIENT_ID }}.zip
          retention-days: 30
