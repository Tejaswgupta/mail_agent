name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: "Client name (e.g. AcmeCorp)"
        required: true
      expiry:
        description: "License expiry date (YYYY-MM-DD)"
        required: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard
          python -m playwright install chromium

      - name: Inject signing key into license_validator.py
        shell: python
        env:
          SIGNING_KEY: ${{ secrets.LICENSE_SIGNING_KEY }}
        run: |
          import os, re
          key = os.environ["SIGNING_KEY"]
          with open("license_validator.py", "r", encoding="utf-8") as f:
            src = f.read()
          src = re.sub(r'_SIGNING_KEY = b"[^"]+"', f'_SIGNING_KEY = b"{key}"', src)
          with open("license_validator.py", "w", encoding="utf-8") as f:
            f.write(src)

      - name: Mint license key
        shell: python
        env:
          SIGNING_KEY: ${{ secrets.LICENSE_SIGNING_KEY }}
          CLIENT_ID: ${{ github.event.inputs.client_id }}
          EXPIRY: ${{ github.event.inputs.expiry }}
        run: |
          import os, base64, hashlib, hmac, json
          key = os.environ["SIGNING_KEY"].encode()
          client_id = os.environ["CLIENT_ID"]
          expiry = os.environ["EXPIRY"]
          payload = json.dumps({"client_id": client_id, "expiry": expiry}, separators=(",", ":"))
          payload_b64 = base64.b64encode(payload.encode()).decode()
          sig = hmac.new(key, payload_b64.encode(), hashlib.sha256).hexdigest()
          with open("license.key", "w", encoding="utf-8") as f:
            f.write(f"{payload_b64}.{sig}\n")
          print(f"Minted license for '{client_id}' valid until {expiry}")

      - name: Build EXE with Nuitka
        run: |
          python -m nuitka `
            --onefile `
            --standalone `
            --assume-yes-for-downloads `
            --windows-console-mode=attach `
            --windows-company-name="DRI" `
            --windows-product-name="Mail Agent" `
            --windows-file-version="1.0.0.0" `
            --windows-product-version="1.0.0.0" `
            --windows-file-description="DRI Mail Agent" `
            --onefile-tempdir-spec="{CACHE_DIR}\DRI\mail_agent" `
            --include-package=playwright `
            --include-package=pydantic `
            --include-package=pydantic_settings `
            --include-package=loguru `
            --include-package=supabase `
            --include-package=httpx `
            --include-package=requests `
            --include-package=openpyxl `
            --include-package=pdfplumber `
            --include-data-dir=migrations=migrations `
            --output-dir=dist `
            --output-filename=mail_agent.exe `
            launcher.py

      - name: Package for client
        shell: pwsh
        run: |
          $out = "release"
          New-Item -ItemType Directory -Force -Path $out
          Copy-Item "dist\mail_agent.exe" "$out\mail_agent.exe"
          Copy-Item "license.key"         "$out\license.key"
          Copy-Item ".env.example"        "$out\.env.example"
          if (Test-Path "INSTALL.md") { Copy-Item "INSTALL.md" "$out\INSTALL.md" }
          Compress-Archive -Path "$out\*" -DestinationPath "mail_agent_${{ github.event.inputs.client_id }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mail_agent_${{ github.event.inputs.client_id }}
          path: mail_agent_${{ github.event.inputs.client_id }}.zip
          retention-days: 30
